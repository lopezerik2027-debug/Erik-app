<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGrad)" opacity="0.1" stroke="url(#logoGrad)" stroke-width="3"/>
  <!-- Erik text -->
  <text x="100" y="110" font-size="60" font-weight="bold" text-anchor="middle" fill="url(#logoGrad)" font-family="Arial, sans-serif">E</text>
  <!-- Tech elements -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.3"/>
  <!-- Dots around -->
  <circle cx="100" cy="35" r="4" fill="url(#logoGrad)"/>
  <circle cx="165" cy="100" r="4" fill="url(#logoGrad)"/>
  <circle cx="100" cy="165" r="4" fill="url(#logoGrad)"/>
  <circle cx="35" cy="100" r="4" fill="url(#logoGrad)"/>
</svg>